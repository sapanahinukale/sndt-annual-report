<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNDT Admin Dashboard</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --primary:#1a1f2e;--accent:#4f6ef7;--accent2:#e8a838;--success:#22c98a;--danger:#e85a5a;--bg:#f0f2f8;--card:#fff;--border:#e2e6f0;--text:#1a1f2e;--muted:#6b7399; }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

    /* TOPBAR */
    #topbar{background:var(--primary);padding:0 28px;height:62px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 16px rgba(0,0,0,0.18);position:sticky;top:0;z-index:60;}
    .tb-brand{display:flex;align-items:center;gap:12px;}
    .tb-logo{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.95rem;}
    .tb-brand h1{font-family:'Playfair Display',serif;font-size:1.05rem;color:#fff;}
    .tb-right{display:flex;align-items:center;gap:10px;}
    .db-dot-wrap{display:flex;align-items:center;gap:6px;font-size:0.75rem;font-weight:600;padding:4px 12px;border-radius:20px;}
    .db-dot-wrap.ok{background:rgba(34,201,138,0.18);color:#22c98a;}
    .db-dot-wrap.err{background:rgba(232,90,90,0.18);color:#e85a5a;}
    .db-dot{width:7px;height:7px;border-radius:50%;background:currentColor;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
    .user-chip{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.1);border-radius:20px;padding:4px 14px;color:rgba(255,255,255,0.82);font-size:0.78rem;}
    .btn{padding:7px 16px;border-radius:9px;font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all 0.18s;}
    .btn-outline-w{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);}
    .btn-outline-w:hover{background:rgba(255,255,255,0.18);}
    .btn-primary{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(79,110,247,0.3);}
    .btn-primary:hover{background:#3b5ce4;}
    .btn-outline{background:var(--card);border:1.5px solid var(--border);color:var(--text);}
    .btn-outline:hover{border-color:var(--accent);color:var(--accent);}
    .btn-success{background:var(--success);color:#fff;}
    .btn-danger{background:var(--danger);color:#fff;}
    .btn-sm{padding:5px 11px;font-size:0.76rem;border-radius:7px;}

    /* TABS */
    #tabbar{background:var(--card);border-bottom:2px solid var(--border);padding:0 28px;display:flex;gap:4px;position:sticky;top:62px;z-index:50;}
    .tab-btn{padding:14px 20px;font-family:'DM Sans',sans-serif;font-size:0.86rem;font-weight:600;color:var(--muted);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;gap:7px;margin-bottom:-2px;}
    .tab-btn:hover{color:var(--accent);}
    .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
    .tab-badge{background:#eff2ff;color:var(--accent);font-size:0.65rem;font-weight:700;padding:2px 7px;border-radius:10px;}

    /* CONTENT */
    #content{flex:1;padding:28px;}
    .tab-panel{display:none;}
    .tab-panel.active{display:block;}

    /* STATS */
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
    .stat-card{background:var(--card);border-radius:14px;padding:18px 20px;border:1px solid var(--border);display:flex;align-items:center;gap:14px;box-shadow:0 1px 5px rgba(26,31,46,0.05);}
    .stat-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
    .si-blue{background:#eff2ff;color:var(--accent);} .si-green{background:#e8faf3;color:var(--success);} .si-amber{background:#fef8ec;color:var(--accent2);} .si-red{background:#fef0f0;color:var(--danger);}
    .stat-val{font-size:1.5rem;font-weight:700;color:var(--primary);line-height:1;}
    .stat-lbl{font-size:0.73rem;color:var(--muted);margin-top:3px;}

    /* TOOLBAR */
    .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
    .search-wrap{flex:1;min-width:200px;position:relative;}
    .search-wrap i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.82rem;}
    .search-wrap input{width:100%;padding:9px 12px 9px 34px;border:1.5px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:0.85rem;background:var(--card);color:var(--text);}
    .search-wrap input:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px rgba(79,110,247,0.09);}
    select.filter{padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:0.85rem;background:var(--card);color:var(--text);cursor:pointer;min-width:150px;}
    select.filter:focus{border-color:var(--accent);outline:none;}

    /* YEAR TABS */
    .year-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
    .ytab{padding:5px 16px;border-radius:20px;font-size:0.80rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--muted);transition:all 0.16s;}
    .ytab:hover{border-color:var(--accent);color:var(--accent);}
    .ytab.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 2px 8px rgba(79,110,247,0.28);}

    /* TABLE CARD */
    .tcard{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;box-shadow:0 1px 5px rgba(26,31,46,0.05);}
    .tcard-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .tcard-head h3{font-family:'Playfair Display',serif;font-size:0.95rem;color:var(--primary);}
    .cbadge{background:#eff2ff;color:var(--accent);font-size:0.70rem;font-weight:700;padding:3px 10px;border-radius:20px;}
    table{width:100%;border-collapse:collapse;}
    thead tr{background:#f5f7ff;border-bottom:2px solid var(--border);}
    thead th{padding:10px 16px;text-align:left;font-size:0.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;white-space:nowrap;}
    tbody tr{border-bottom:1px solid var(--border);transition:background 0.1s;cursor:pointer;}
    tbody tr:last-child{border-bottom:none;}
    tbody tr:hover{background:#f5f7ff;}
    tbody td{padding:12px 16px;font-size:0.84rem;color:var(--text);vertical-align:middle;}
    .dept-cell{display:flex;align-items:center;gap:9px;font-weight:600;}
    .avatar{width:30px;height:30px;border-radius:7px;color:#fff;font-size:0.68rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:600;}
    .pill-green{background:#e8faf3;color:var(--success);}
    .pill-amber{background:#fef8ec;color:var(--accent2);}
    .acts{display:flex;gap:5px;}
    .no-data{text-align:center;padding:48px 20px;color:var(--muted);}
    .no-data i{font-size:2.2rem;color:var(--border);margin-bottom:10px;display:block;}
    .spinner-wrap{text-align:center;padding:48px 20px;}
    .spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto 12px;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* USERS TAB */
    .users-grid{display:grid;grid-template-columns:360px 1fr;gap:20px;align-items:start;}
    .form-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:22px 24px;box-shadow:0 1px 5px rgba(26,31,46,0.05);}
    .form-card h3{font-family:'Playfair Display',serif;font-size:1rem;color:var(--primary);margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border);}
    .form-field{margin-bottom:14px;}
    .form-field label{display:block;font-size:0.78rem;font-weight:600;color:var(--primary);margin-bottom:5px;}
    .form-field input,.form-field select{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:0.86rem;background:#fff;color:var(--text);transition:all 0.16s;}
    .form-field input:focus,.form-field select:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px rgba(79,110,247,0.09);}
    .user-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:#f8f9fd;border-radius:9px;margin-bottom:8px;border:1px solid var(--border);}
    .user-info{display:flex;align-items:center;gap:10px;}
    .user-avatar{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:#fff;}
    .ua-admin{background:var(--accent);}
    .ua-dept{background:var(--success);}
    .user-name{font-size:0.85rem;font-weight:600;color:var(--primary);}
    .user-dept{font-size:0.72rem;color:var(--muted);margin-top:1px;}
    .role-tag{font-size:0.68rem;font-weight:700;padding:2px 8px;border-radius:6px;}
    .rt-admin{background:#eff2ff;color:var(--accent);}
    .rt-dept{background:#e8faf3;color:var(--success);}

    /* DETAIL MODAL */
    #detailModal{display:none;position:fixed;inset:0;z-index:999;background:rgba(26,31,46,0.55);align-items:flex-start;justify-content:center;overflow-y:auto;padding:28px 16px;backdrop-filter:blur(3px);}
    #detailModal.open{display:flex;}
    .mbox{background:#fff;border-radius:18px;width:100%;max-width:820px;box-shadow:0 24px 80px rgba(26,31,46,0.2);overflow:hidden;margin:auto;}
    .mhead{background:var(--primary);padding:20px 26px;display:flex;align-items:center;justify-content:space-between;}
    .mhead h2{font-family:'Playfair Display',serif;font-size:1.05rem;color:#fff;}
    .mhead-meta{display:flex;align-items:center;gap:8px;margin-top:4px;}
    .ychip{background:var(--accent);color:#fff;font-size:0.72rem;font-weight:700;padding:3px 11px;border-radius:20px;}
    .mclose{background:rgba(255,255,255,0.12);border:none;color:#fff;width:30px;height:30px;border-radius:7px;cursor:pointer;font-size:0.95rem;display:flex;align-items:center;justify-content:center;}
    .mclose:hover{background:rgba(255,255,255,0.22);}
    .mbody{padding:24px;overflow-y:auto;max-height:65vh;}
    .mfooter{padding:14px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;}
    .dsec{margin-bottom:20px;}
    .dsec h4{font-family:'Playfair Display',serif;font-size:0.88rem;color:var(--primary);margin-bottom:9px;padding-bottom:5px;border-bottom:2px solid var(--border);display:flex;align-items:center;gap:7px;}
    .dsec h4 i{color:var(--accent);font-size:0.82rem;}
    .dgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
    .ditem{background:#f8f9fd;border-radius:7px;padding:8px 12px;}
    .ditem .dl{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.4px;color:var(--muted);font-weight:700;margin-bottom:2px;}
    .ditem .dv{font-size:0.83rem;font-weight:500;color:var(--primary);word-break:break-word;}
    .dtable{width:100%;border-collapse:collapse;font-size:0.80rem;}
    .dtable th{background:#eef0f8;padding:6px 9px;text-align:left;font-weight:700;color:var(--primary);border:1px solid var(--border);}
    .dtable td{padding:5px 9px;border:1px solid var(--border);}
    .dtable tr:nth-child(even) td{background:#fafbff;}
    .sig-img{max-width:150px;max-height:70px;border:1px solid var(--border);border-radius:5px;margin-top:6px;}

    /* DELETE CONFIRM */
    #cfModal{display:none;position:fixed;inset:0;z-index:1200;background:rgba(26,31,46,0.6);align-items:center;justify-content:center;backdrop-filter:blur(3px);}
    #cfModal.open{display:flex;}
    .cfbox{background:#fff;border-radius:16px;padding:30px 34px;max-width:380px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(26,31,46,0.2);border-top:4px solid var(--danger);}
    .cfbox .ci{width:48px;height:48px;background:#fef0f0;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:1.2rem;color:var(--danger);}
    .cfbox h3{font-family:'Playfair Display',serif;font-size:1rem;margin-bottom:6px;}
    .cfbox p{font-size:0.81rem;color:var(--muted);margin-bottom:20px;}
    .cfacts{display:flex;gap:8px;justify-content:center;}

    /* TOAST */
    #toast{position:fixed;bottom:20px;right:20px;z-index:9999;background:var(--primary);color:#fff;padding:10px 16px;border-radius:11px;font-size:0.80rem;font-weight:500;display:flex;align-items:center;gap:7px;box-shadow:0 8px 28px rgba(26,31,46,0.22);opacity:0;transform:translateY(8px);transition:all 0.28s;pointer-events:none;}
    #toast.show{opacity:1;transform:translateY(0);}
    #toast.success{background:#18a872;} #toast.error{background:#c0392b;}

    @media(max-width:900px){.stats-row{grid-template-columns:repeat(2,1fr);}.users-grid{grid-template-columns:1fr;}.dgrid{grid-template-columns:1fr;}}
  </style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div class="tb-brand">
    <div class="tb-logo"><i class="fas fa-university"></i></div>
    <h1>SNDT Admin Dashboard</h1>
  </div>
  <div class="tb-right">
    <div class="db-dot-wrap err" id="dbBadge"><span class="db-dot"></span><span id="dbLabel">Connecting…</span></div>
    <div class="user-chip"><i class="fas fa-user-shield"></i><span id="adminName">Admin</span></div>
    <button class="btn btn-outline-w" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</div>

<!-- TAB BAR -->
<div id="tabbar">
  <button class="tab-btn active" id="tab-reports" onclick="switchTab('reports')">
    <i class="fas fa-file-alt"></i> Annual Reports <span class="tab-badge" id="repBadge">0</span>
  </button>
  <button class="tab-btn" id="tab-users" onclick="switchTab('users')">
    <i class="fas fa-users-cog"></i> User Management <span class="tab-badge" id="userBadge">0</span>
  </button>
</div>

<!-- CONTENT -->
<div id="content">

  <!-- ═══ REPORTS TAB ═══ -->
  <div class="tab-panel active" id="panel-reports">

    <div class="stats-row">
      <div class="stat-card"><div class="stat-icon si-blue"><i class="fas fa-layer-group"></i></div><div><div class="stat-val" id="stTotal">—</div><div class="stat-lbl">Total Reports</div></div></div>
      <div class="stat-card"><div class="stat-icon si-green"><i class="fas fa-building"></i></div><div><div class="stat-val" id="stDepts">—</div><div class="stat-lbl">Departments</div></div></div>
      <div class="stat-card"><div class="stat-icon si-amber"><i class="fas fa-calendar-alt"></i></div><div><div class="stat-val" id="stYears">—</div><div class="stat-lbl">Academic Years</div></div></div>
      <div class="stat-card"><div class="stat-icon si-red"><i class="fas fa-clock"></i></div><div><div class="stat-val" id="stLatest">—</div><div class="stat-lbl">Last Submitted</div></div></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap"><i class="fas fa-search"></i><input type="text" id="srch" placeholder="Search department…" oninput="filterReports()"></div>
      <select class="filter" id="yrFilter" onchange="filterReports()"><option value="">All Years</option></select>
      <button class="btn btn-outline" onclick="loadReports()"><i class="fas fa-sync-alt"></i> Refresh</button>
      <button class="btn btn-outline" onclick="exportCSV()"><i class="fas fa-file-csv"></i> Export CSV</button>
    </div>

    <div class="year-tabs" id="yearTabs"></div>

    <div class="tcard">
      <div class="tcard-head">
        <h3><i class="fas fa-table" style="color:var(--accent);margin-right:7px;"></i>All Submitted Reports</h3>
        <span class="cbadge" id="countBadge">0 reports</span>
      </div>
      <div id="repTableWrap">
        <div class="spinner-wrap"><div class="spinner"></div><p style="color:var(--muted);font-size:0.82rem;">Loading…</p></div>
      </div>
    </div>
  </div>

  <!-- ═══ USERS TAB ═══ -->
  <div class="tab-panel" id="panel-users">
    <div class="users-grid">

      <!-- ADD USER FORM -->
      <div class="form-card">
        <h3><i class="fas fa-user-plus" style="color:var(--accent);margin-right:8px;"></i>Add New User</h3>
        <div id="userFormErr" style="display:none;background:#fef0f0;border:1px solid #fcc;border-radius:8px;padding:8px 12px;font-size:0.80rem;color:var(--danger);margin-bottom:12px;"></div>
        <div class="form-field"><label>Username</label><input type="text" id="newUsername" placeholder="e.g. dept_computer"></div>
        <div class="form-field"><label>Password</label><input type="password" id="newPassword" placeholder="Set a password"></div>
        <div class="form-field">
          <label>Role</label>
          <select id="newRole" onchange="toggleDeptField()">
            <option value="department">Department</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-field" id="deptNameField">
          <label>Department Name <small style="color:var(--muted)">(must match exactly in reports)</small></label>
          <input type="text" id="newDeptName" placeholder="e.g. Computer Science">
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px;" onclick="addUser()">
          <i class="fas fa-plus"></i> Create User
        </button>
      </div>

      <!-- USERS LIST -->
      <div class="tcard">
        <div class="tcard-head">
          <h3><i class="fas fa-users" style="color:var(--accent);margin-right:7px;"></i>All Users</h3>
          <span class="cbadge" id="userCountBadge">0 users</span>
        </div>
        <div id="usersListWrap">
          <div class="spinner-wrap"><div class="spinner"></div></div>
        </div>
      </div>

    </div>
  </div>

</div><!-- /content -->

<!-- ═══ DETAIL MODAL ═══ -->
<div id="detailModal">
  <div class="mbox">
    <div class="mhead">
      <div>
        <h2 id="mDeptName">—</h2>
        <div class="mhead-meta">
          <span class="ychip" id="mYear">—</span>
          <span style="font-size:0.72rem;color:rgba(255,255,255,0.42);" id="mSubmitted">—</span>
        </div>
      </div>
      <button class="mclose" onclick="closeDetail()"><i class="fas fa-times"></i></button>
    </div>
    <div class="mbody" id="mBody"><div class="spinner-wrap"><div class="spinner"></div></div></div>
    <div class="mfooter">
      <button class="btn btn-outline" onclick="closeDetail()"><i class="fas fa-times"></i> Close</button>
      <button class="btn btn-outline" onclick="printReport()"><i class="fas fa-print"></i> Print</button>
    </div>
  </div>
</div>

<!-- ═══ CONFIRM DELETE ═══ -->
<div id="cfModal">
  <div class="cfbox">
    <div class="ci"><i class="fas fa-trash-alt"></i></div>
    <h3>Delete Report?</h3>
    <p id="cfMsg">This cannot be undone.</p>
    <div class="cfacts">
      <button class="btn btn-outline" onclick="closeCf()">Cancel</button>
      <button class="btn btn-danger" id="cfBtn">Delete</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"><i class="fas fa-check-circle"></i><span id="toastMsg">Done</span></div>

<script>
const API = 'http://localhost:3001/api';

// ── Auth guard ──
const token    = localStorage.getItem('sndt_token');
const role     = localStorage.getItem('sndt_role');
const username = localStorage.getItem('sndt_username');
if (!token || role !== 'admin') { window.location.href = 'login.html'; }
document.getElementById('adminName').textContent = username || 'Admin';

function authHeaders() {
  return { 'Content-Type': 'application/json', 'x-auth-token': token };
}

function logout() {
  localStorage.clear();
  window.location.href = 'login.html';
}

// ── Toast ──
function toast(msg, type = 'info') {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.className = type === 'success' ? 'show success' : type === 'error' ? 'show error' : 'show';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = '', 3500);
}

// ── Tab switching ──
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'users') loadUsers();
}

// ── Health check ──
async function checkHealth() {
  try {
    const res  = await fetch(`${API}/health`, { signal: AbortSignal.timeout(5000) });
    const data = await res.json();
    const badge = document.getElementById('dbBadge');
    if (data.db === 'connected') {
      badge.className = 'db-dot-wrap ok';
      document.getElementById('dbLabel').textContent = 'Atlas Connected';
    } else {
      badge.className = 'db-dot-wrap err';
      document.getElementById('dbLabel').textContent = 'DB Disconnected';
    }
  } catch {
    document.getElementById('dbBadge').className = 'db-dot-wrap err';
    document.getElementById('dbLabel').textContent = 'Server Offline';
  }
}

// ────────────── REPORTS ──────────────────
let allReports = [], activeYear = '';

async function loadReports() {
  document.getElementById('repTableWrap').innerHTML =
    `<div class="spinner-wrap"><div class="spinner"></div><p style="color:var(--muted);font-size:0.80rem;">Fetching from MongoDB Atlas…</p></div>`;
  try {
    const res  = await fetch(`${API}/reports`, { headers: authHeaders() });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    allReports = data.reports || [];
    buildYearTabs();
    updateStats();
    renderTable();
    document.getElementById('repBadge').textContent = allReports.length;
  } catch(err) {
    document.getElementById('repTableWrap').innerHTML =
      `<div class="no-data"><i class="fas fa-plug"></i><p>Cannot reach server.<br><small style="color:var(--danger)">${err.message}</small><br><small>Make sure <code>node server.js</code> is running.</small></p></div>`;
  }
}

function buildYearTabs() {
  const years = [...new Set(allReports.map(r => r.academicYear))].sort().reverse();
  const tabsEl   = document.getElementById('yearTabs');
  const filterEl = document.getElementById('yrFilter');
  tabsEl.innerHTML   = `<button class="ytab ${activeYear===''?'active':''}" onclick="setYear('')">All Years</button>`;
  filterEl.innerHTML = `<option value="">All Years</option>`;
  years.forEach(y => {
    tabsEl.innerHTML   += `<button class="ytab ${activeYear===y?'active':''}" onclick="setYear('${y}')">${y}</button>`;
    filterEl.innerHTML += `<option value="${y}"${activeYear===y?' selected':''}>${y}</option>`;
  });
}

function setYear(y) {
  activeYear = y;
  document.getElementById('yrFilter').value = y;
  document.querySelectorAll('.ytab').forEach(t => t.classList.toggle('active', t.textContent.trim() === (y || 'All Years')));
  renderTable();
}

function updateStats() {
  const total  = allReports.length;
  const depts  = new Set(allReports.map(r => r.section1?.departmentName).filter(Boolean)).size;
  const years  = new Set(allReports.map(r => r.academicYear)).size;
  const latest = allReports.reduce((a, r) => { const d = new Date(r.updatedAt || r.submittedAt); return d > a ? d : a; }, new Date(0));
  document.getElementById('stTotal').textContent  = total;
  document.getElementById('stDepts').textContent  = depts;
  document.getElementById('stYears').textContent  = years;
  document.getElementById('stLatest').textContent = total > 0 ? latest.toLocaleDateString('en-IN',{day:'2-digit',month:'short'}) : '—';
}

function filterReports() {
  const y = document.getElementById('yrFilter').value;
  activeYear = y;
  document.querySelectorAll('.ytab').forEach(t => t.classList.toggle('active', t.textContent.trim() === (y || 'All Years')));
  renderTable();
}

const COLORS = ['#4f6ef7','#22c98a','#e8a838','#e85a5a','#a855f7','#06b6d4','#f97316','#ec4899'];
const getColor    = n => COLORS[(n||'A').charCodeAt(0) % COLORS.length];
const getInitials = n => (n||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
const fmtDate     = d => d ? new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';

function renderTable() {
  const q = document.getElementById('srch').value.toLowerCase().trim();
  const y = activeYear;
  const filtered = allReports.filter(r => {
    const dn = (r.section1?.departmentName || '').toLowerCase();
    return (!q || dn.includes(q) || (r.academicYear||'').includes(q)) && (!y || r.academicYear === y);
  });
  document.getElementById('countBadge').textContent = `${filtered.length} report${filtered.length!==1?'s':''}`;
  if (!filtered.length) {
    document.getElementById('repTableWrap').innerHTML = `<div class="no-data"><i class="fas fa-inbox"></i><p>No reports found.</p></div>`;
    return;
  }
  const rows = filtered.map(r => {
    const dept = r.section1?.departmentName || 'Unnamed';
    const col  = getColor(dept);
    return `<tr onclick="viewReport('${r._id}')">
      <td><div class="dept-cell"><div class="avatar" style="background:${col}">${getInitials(dept)}</div>${dept}</div></td>
      <td><strong>${r.academicYear||'—'}</strong></td>
      <td><span class="pill pill-green"><i class="fas fa-check-circle"></i> Submitted</span></td>
      <td style="color:var(--muted);font-size:0.79rem;">${r.submittedBy||'—'}</td>
      <td style="color:var(--muted);font-size:0.79rem;">${fmtDate(r.updatedAt||r.submittedAt)}</td>
      <td onclick="event.stopPropagation()">
        <div class="acts">
          <button class="btn btn-outline btn-sm" onclick="viewReport('${r._id}')"><i class="fas fa-eye"></i> View</button>
          <button class="btn btn-primary btn-sm" onclick="openEdit('${r._id}')"><i class="fas fa-edit"></i> Edit</button>
          <button class="btn btn-danger btn-sm" onclick="confirmDel('${r._id}','${dept.replace(/'/g,"\\'")}')"><i class="fas fa-trash"></i></button>
        </div>
      </td>
    </tr>`;
  }).join('');
  document.getElementById('repTableWrap').innerHTML = `
    <table>
      <thead><tr><th>Department</th><th>Year</th><th>Status</th><th>Submitted By</th><th>Last Updated</th><th>Actions</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── View report detail ──
let currentReport = null;
async function viewReport(id) {
  document.getElementById('detailModal').classList.add('open');
  document.getElementById('mBody').innerHTML = `<div class="spinner-wrap"><div class="spinner"></div></div>`;
  try {
    const res  = await fetch(`${API}/report/${id}`, { headers: authHeaders() });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    currentReport = data.report;
    const r = currentReport;
    document.getElementById('mDeptName').textContent = r.section1?.departmentName || 'Unnamed Dept';
    document.getElementById('mYear').textContent     = r.academicYear || '—';
    document.getElementById('mSubmitted').textContent = r.submittedAt ? 'Submitted: ' + new Date(r.submittedAt).toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'}) : '';
    document.getElementById('mBody').innerHTML = buildDetailHTML(r);
  } catch(err) {
    document.getElementById('mBody').innerHTML = `<div class="no-data"><i class="fas fa-exclamation-circle"></i><p>${err.message}</p></div>`;
  }
}

function fi(l,v){ return `<div class="ditem"><div class="dl">${l}</div><div class="dv">${v||'—'}</div></div>`; }
function tbl(rows,cols){
  if (!rows?.length) return `<p style="color:var(--muted);font-size:0.80rem;padding:5px 0;">No data entered.</p>`;
  const h = cols.map(c=>`<th>${c.l}</th>`).join('');
  const b = rows.map(r=>`<tr>${cols.map(c=>`<td>${r[c.k]??'—'}</td>`).join('')}</tr>`).join('');
  return `<div style="overflow-x:auto"><table class="dtable"><thead><tr>${h}</tr></thead><tbody>${b}</tbody></table></div>`;
}

function buildDetailHTML(r) {
  const s1=r.section1||{}, s2=r.section2||{}, s3=r.section3||{}, s4=r.section4||{}, s5=r.section5||{}, s6=r.section6||{}, s7=r.section7||{}, s8=r.section8||{}, s9=r.section9||{}, s10=r.section10||{};
  return `
  <div class="dsec"><h4><i class="fas fa-building"></i> Section 1 — Basic Details</h4>
    <div class="dgrid">${fi('Department',s1.departmentName)}${fi('Estd. Year',s1.yearOfEstablishment)}${fi('HOD',s1.hodName)}${fi('HOD In-Charge',s1.hodInCharge)}${fi('Telephone',s1.telephone)}${fi('Email',s1.email)}${fi('Website',s1.website)}${fi('Address',s1.address)}</div></div>
  <div class="dsec"><h4><i class="fas fa-graduation-cap"></i> Programmes</h4>${tbl(s1.programmes,[{k:'type',l:'Type'},{k:'name',l:'Name'},{k:'yearOfStarting',l:'Year'},{k:'aidedUnaided',l:'Status'}])}</div>
  <div class="dsec"><h4><i class="fas fa-users"></i> Intake Capacity</h4>${tbl(s1.intakeCapacity,[{k:'programme',l:'Programme'},{k:'ug',l:'UG'},{k:'pg',l:'PG'},{k:'mphil',l:'M.Phil'},{k:'phd',l:'Ph.D'}])}</div>
  <div class="dsec"><h4><i class="fas fa-user-friends"></i> Admission (Category Wise)</h4>${tbl(s2.categoryAdmission,[{k:'programme',l:'Programme'},{k:'open',l:'Open'},{k:'sc',l:'SC'},{k:'st',l:'ST'},{k:'ntdt',l:'NTDT'},{k:'obc',l:'OBC'},{k:'sbc',l:'SBC'}])}</div>
  <div class="dsec"><h4><i class="fas fa-award"></i> Scholarships</h4>${tbl(s2.scholarships,[{k:'name',l:'Name'},{k:'studentsReceiving',l:'Students'},{k:'organization',l:'Org.'},{k:'totalAmount',l:'Amount ₹'}])}</div>
  <div class="dsec"><h4><i class="fas fa-chalkboard-teacher"></i> Faculty</h4>${tbl(s2.faculty,[{k:'name',l:'Name'},{k:'qualification',l:'Qual.'},{k:'designation',l:'Designation'},{k:'subject',l:'Subject'},{k:'category',l:'Category'}])}</div>
  <div class="dsec"><h4><i class="fas fa-calendar-alt"></i> Events Organized</h4>${tbl(s3.organizedEvents,[{k:'title',l:'Event'},{k:'dateVenue',l:'Date/Venue'},{k:'sponsoringAgency',l:'Sponsor'},{k:'noOfParticipants',l:'Participants'},{k:'level',l:'Level'}])}</div>
  <div class="dsec"><h4><i class="fas fa-book"></i> Journal Articles</h4>${tbl(s4.journalArticles,[{k:'authors',l:'Authors'},{k:'title',l:'Title'},{k:'journal',l:'Journal'},{k:'dateOfPublication',l:'Date'},{k:'peerReview',l:'Peer Review'}])}</div>
  <div class="dsec"><h4><i class="fas fa-flask"></i> Faculty Research Projects</h4>${tbl(s5.facultyResearch,[{k:'facultyName',l:'Faculty'},{k:'type',l:'Type'},{k:'title',l:'Title'},{k:'fundingAgency',l:'Agency'},{k:'status',l:'Status'}])}</div>
  <div class="dsec"><h4><i class="fas fa-trophy"></i> Student Awards</h4>${tbl(s6.studentAwards,[{k:'studentName',l:'Student'},{k:'awardTitle',l:'Award'},{k:'organization',l:'Org.'},{k:'date',l:'Date'}])}</div>
  <div class="dsec"><h4><i class="fas fa-globe"></i> Study Visits</h4>${tbl(s7.studyVisits,[{k:'place',l:'Place'},{k:'faculty',l:'Faculty'},{k:'purpose',l:'Purpose'},{k:'date',l:'Date'}])}</div>
  <div class="dsec"><h4><i class="fas fa-handshake"></i> MOUs</h4>${tbl(s9.mous,[{k:'institution',l:'Institution'},{k:'nationalIntl',l:'Type'},{k:'collaboration',l:'Collaboration'}])}</div>
  ${s10.hodName||s10.hodSignatureBase64?`<div class="dsec"><h4><i class="fas fa-signature"></i> HOD Signature</h4><div class="dgrid">${fi('HOD Name',s10.hodName)}${fi('Date',s10.hodDate)}</div>${s10.hodSignatureBase64?`<img class="sig-img" src="${s10.hodSignatureBase64}" alt="Signature">`:''}
  </div>`:''}
  ${s10.otherInfo?`<div class="dsec"><h4><i class="fas fa-info-circle"></i> Other Info</h4><div style="background:#f8f9fd;border-radius:7px;padding:10px 13px;font-size:0.82rem;line-height:1.6;">${s10.otherInfo}</div></div>`:''}
  `;
}

function closeDetail() { document.getElementById('detailModal').classList.remove('open'); currentReport = null; }

function printReport() {
  if (!currentReport) return;
  const r = currentReport;
  const s1=r.section1||{}, s2=r.section2||{};
  const w = window.open('','_blank');
  const tblP = (rows,cols) => {
    if(!rows?.length) return '<p style="color:#999;font-size:11px;">No data.</p>';
    return `<table style="width:100%;border-collapse:collapse;font-size:10px;margin-bottom:10px;"><thead><tr>${cols.map(c=>`<th style="background:#1a1f2e;color:#fff;padding:5px 7px;text-align:left;">${c.l}</th>`).join('')}</tr></thead><tbody>${rows.map(row=>`<tr>${cols.map(c=>`<td style="padding:4px 7px;border:1px solid #ddd;">${row[c.k]??'—'}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
  };
  w.document.write(`<!DOCTYPE html><html><head><title>${s1.departmentName||'Report'} - ${r.academicYear||''}</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>body{font-family:'DM Sans',sans-serif;padding:28px;font-size:12px;color:#1a1f2e;}h1{font-family:'Playfair Display',serif;font-size:18px;}h3{font-family:'Playfair Display',serif;font-size:13px;margin:14px 0 6px;border-bottom:2px solid #eee;padding-bottom:4px;}.grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px;}.item{background:#f8f9fd;padding:7px 9px;border-radius:5px;}.lbl{font-size:9px;text-transform:uppercase;color:#6b7399;font-weight:700;}.val{font-size:11px;font-weight:500;}</style></head><body>
  <h1>${s1.departmentName||'Department'}</h1>
  <p style="color:#6b7399;font-size:11px;">Annual Report — AY ${r.academicYear||''} &nbsp;|&nbsp; Printed ${new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'})}</p>
  <hr style="margin:12px 0;border:none;border-top:2px solid #eee;">
  <h3>Basic Details</h3>
  <div class="grid"><div class="item"><div class="lbl">Department</div><div class="val">${s1.departmentName||'—'}</div></div><div class="item"><div class="lbl">Estd. Year</div><div class="val">${s1.yearOfEstablishment||'—'}</div></div><div class="item"><div class="lbl">HOD</div><div class="val">${s1.hodName||'—'}</div></div><div class="item"><div class="lbl">Email</div><div class="val">${s1.email||'—'}</div></div><div class="item"><div class="lbl">Phone</div><div class="val">${s1.telephone||'—'}</div></div><div class="item"><div class="lbl">Website</div><div class="val">${s1.website||'—'}</div></div></div>
  <h3>Programmes</h3>${tblP(s1.programmes,[{k:'type',l:'Type'},{k:'name',l:'Name'},{k:'yearOfStarting',l:'Year'},{k:'aidedUnaided',l:'Status'}])}
  <h3>Intake Capacity</h3>${tblP(s1.intakeCapacity,[{k:'programme',l:'Programme'},{k:'ug',l:'UG'},{k:'pg',l:'PG'},{k:'mphil',l:'M.Phil'},{k:'phd',l:'Ph.D'}])}
  <h3>Faculty</h3>${tblP(s2.faculty,[{k:'name',l:'Name'},{k:'qualification',l:'Qual.'},{k:'designation',l:'Designation'},{k:'subject',l:'Subject'}])}
  <h3>Scholarships</h3>${tblP(s2.scholarships,[{k:'name',l:'Name'},{k:'studentsReceiving',l:'Students'},{k:'organization',l:'Org.'},{k:'totalAmount',l:'Amount'}])}
  </body></html>`);
  w.document.close(); w.print();
}

// ── Delete ──
let delId = null;
function confirmDel(id, name) {
  delId = id;
  document.getElementById('cfMsg').textContent = `"${name}" will be permanently deleted from MongoDB Atlas.`;
  document.getElementById('cfModal').classList.add('open');
  document.getElementById('cfBtn').onclick = doDelete;
}
function closeCf() { document.getElementById('cfModal').classList.remove('open'); delId = null; }
async function doDelete() {
  closeCf();
  try {
    const res  = await fetch(`${API}/report/${delId}`, { method:'DELETE', headers: authHeaders() });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    allReports = allReports.filter(r => r._id !== delId);
    buildYearTabs(); updateStats(); renderTable();
    document.getElementById('repBadge').textContent = allReports.length;
    toast('Report deleted ✅', 'success');
  } catch(err) { toast('Delete failed: ' + err.message, 'error'); }
  delId = null;
}

// ── Export CSV ──
function exportCSV() {
  if (!allReports.length) { toast('No reports to export', 'error'); return; }
  const hdr  = ['Department','Academic Year','HOD','Email','Phone','Submitted By','Last Updated'];
  const rows = allReports.map(r => [r.section1?.departmentName||'',r.academicYear||'',r.section1?.hodName||'',r.section1?.email||'',r.section1?.telephone||'',r.submittedBy||'',r.updatedAt?new Date(r.updatedAt).toLocaleDateString('en-IN'):'']);
  const csv  = [hdr,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = `SNDT_Reports_${new Date().toLocaleDateString('en-IN').replace(/\//g,'-')}.csv`;
  a.click();
  toast('CSV exported ✅', 'success');
}

// ────────────── USERS ──────────────────────
async function loadUsers() {
  document.getElementById('usersListWrap').innerHTML = `<div class="spinner-wrap"><div class="spinner"></div></div>`;
  try {
    const res  = await fetch(`${API}/users`, { headers: authHeaders() });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    const users = data.users || [];
    document.getElementById('userBadge').textContent    = users.length;
    document.getElementById('userCountBadge').textContent = `${users.length} users`;
    if (!users.length) {
      document.getElementById('usersListWrap').innerHTML = `<div class="no-data"><i class="fas fa-user-slash"></i><p>No users yet.</p></div>`;
      return;
    }
    document.getElementById('usersListWrap').innerHTML = `<div style="padding:16px;">` +
      users.map(u => `
        <div class="user-row">
          <div class="user-info">
            <div class="user-avatar ${u.role==='admin'?'ua-admin':'ua-dept'}">${(u.username||'?')[0].toUpperCase()}</div>
            <div>
              <div class="user-name">${u.username}</div>
              <div class="user-dept">${u.deptName||'—'}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="role-tag ${u.role==='admin'?'rt-admin':'rt-dept'}">${u.role}</span>
            ${u.role!=='admin'?`<button class="btn btn-danger btn-sm" onclick="deleteUser('${u._id}','${u.username}')"><i class="fas fa-trash"></i></button>`:''}
          </div>
        </div>`).join('') + `</div>`;
  } catch(err) {
    document.getElementById('usersListWrap').innerHTML = `<div class="no-data"><i class="fas fa-exclamation-circle"></i><p>${err.message}</p></div>`;
  }
}

function toggleDeptField() {
  const role = document.getElementById('newRole').value;
  document.getElementById('deptNameField').style.display = role === 'department' ? 'block' : 'none';
}

async function addUser() {
  const errEl = document.getElementById('userFormErr');
  errEl.style.display = 'none';
  const username = document.getElementById('newUsername').value.trim();
  const password = document.getElementById('newPassword').value;
  const role     = document.getElementById('newRole').value;
  const deptName = document.getElementById('newDeptName').value.trim();

  if (!username || !password) { errEl.textContent = 'Username and password are required'; errEl.style.display='block'; return; }
  if (role === 'department' && !deptName) { errEl.textContent = 'Department name is required for department users'; errEl.style.display='block'; return; }

  try {
    const res  = await fetch(`${API}/users`, { method:'POST', headers: authHeaders(), body: JSON.stringify({ username, password, role, deptName }) });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    toast(`User "${username}" created ✅`, 'success');
    document.getElementById('newUsername').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('newDeptName').value = '';
    loadUsers();
  } catch(err) { errEl.textContent = err.message; errEl.style.display='block'; }
}

async function deleteUser(id, name) {
  if (!confirm(`Delete user "${name}"?`)) return;
  try {
    const res  = await fetch(`${API}/users/${id}`, { method:'DELETE', headers: authHeaders() });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    toast(`User "${name}" deleted`, 'success');
    loadUsers();
  } catch(err) { toast('Error: ' + err.message, 'error'); }
}

// ── Open Edit ──
function openEdit(id) {
  // Store the report ID in sessionStorage, then open index.html
  sessionStorage.setItem('sndt_edit_id', id);
  window.open('index.html', '_blank');
}

// ── Init ──
checkHealth();
loadReports();
setInterval(checkHealth, 30000);
setInterval(loadReports, 60000);
